<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CarePlus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body style="background: #F1F5F9; display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="glass-card" style="width: 100%; max-width: 460px; padding: 2rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1rem;">
                <div class="logo-icon">+</div> CarePlus
            </a>
            <h2>Reset Password</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0;">
                Set your new password.
            </p>
            <p class="small text-muted mb-0">Account: <span id="resetEmailDisplay">Loading...</span></p>
        </div>

        <div id="resetAlert" class="alert alert-info d-none"></div>

        <form id="resetPasswordForm">
            <div class="form-group mb-3">
                <label>New Password</label>
                <div class="input-group">
                    <input type="text" id="newPassword" class="form-control" minlength="6" required autocomplete="new-password">
                    <button class="btn btn-outline-secondary password-toggle" type="button" data-target="#newPassword" aria-label="Hide password">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>
            </div>

            <div class="form-group mb-2">
                <label>Confirm Password</label>
                <div class="input-group">
                    <input type="text" id="confirmPassword" class="form-control" minlength="6" required autocomplete="new-password">
                    <button class="btn btn-outline-secondary password-toggle" type="button" data-target="#confirmPassword" aria-label="Hide password">
                        <i class="bi bi-eye-slash"></i>
                    </button>
                </div>
            </div>
            <div class="small text-muted mb-4">
                Password is visible by default. Click the eye button to hide it (dot mode).
            </div>

            <button type="submit" class="btn-primary w-100 justify-content-center">Reset Password</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            Back to <a href="login.html" style="color: var(--primary-blue); text-decoration: none; font-weight: 600;">Login</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/password_reset.js?v=1"></script>
</body>
</html>
