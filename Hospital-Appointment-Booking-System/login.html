<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CarePlus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body style="background: #F1F5F9; display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    
    <div class="glass-card" style="width: 100%; max-width: 400px; padding: 2rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1rem;">
                <div class="logo-icon">+</div> CarePlus
            </a>
            <h2>Welcome Back</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Sign in to your account</p>
        </div>

        <div id="loginAlert" class="alert alert-danger d-none"></div>

        <form id="loginForm">
            <div class="form-group mb-3">
                <label>Email Address</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="form-group mb-4">
                <label>Password</label>
                <div class="input-group">
                    <input type="password" id="password" class="form-control" required>
                    <button class="btn btn-outline-secondary password-toggle" type="button" data-target="#password" aria-label="Show or hide password">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div class="text-end mt-2">
                    <a href="forgot_password.html" style="color: var(--primary-blue); text-decoration: none; font-size: 0.85rem; font-weight: 600;">Forgot Password?</a>
                </div>
            </div>
            <button type="submit" class="btn-primary w-100 justify-content-center">Login</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            Don't have an account? <a href="register.html" style="color: var(--primary-blue); text-decoration: none; font-weight: 600;">Sign up as Patient</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/auth.js?v=4"></script>
</body>
</html>
