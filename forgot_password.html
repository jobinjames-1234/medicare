<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - CarePlus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body style="background: #F1F5F9; display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="glass-card" style="width: 100%; max-width: 420px; padding: 2rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 1rem;">
                <div class="logo-icon">+</div> CarePlus
            </a>
            <h2>Forgot Password</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Enter your email to generate a password reset link.</p>
        </div>

        <div id="forgotAlert" class="alert alert-info d-none"></div>

        <form id="forgotPasswordForm">
            <div class="form-group mb-4">
                <label>Email Address</label>
                <input type="email" id="forgotEmail" class="form-control" required>
            </div>
            <button type="submit" class="btn-primary w-100 justify-content-center">Generate Reset Link</button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            Back to <a href="login.html" style="color: var(--primary-blue); text-decoration: none; font-weight: 600;">Login</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/password_reset.js?v=1"></script>
</body>
</html>
